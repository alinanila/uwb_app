name: Tests (hatch)

on:
  push:
    branches: ["demo_app"]
  pull_request:
    branches: ["demo_app"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install Hatch
        run: pip install --upgrade pip hatch

      - name: Cache Hatch
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/hatch
            .hatch
          key: ${{ runner.os }}-hatch-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-hatch-

      - name: Run tests
        run: hatch test
